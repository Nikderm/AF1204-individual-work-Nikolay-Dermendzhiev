      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

u003C/li\u003E \u003Cli\u003E\u003Cem\u003ERelevant Modules:\u003C/em\u003E Introduction to Data Science and AI Tools, Financial Accounting.\u003C/li\u003E \u003Cli\u003E\u003Cstrong\u003EStanmore college\u003C/strong\u003E, BTEC business Level 3 Diploma (2023-2025).\u003C/li\u003E \u003Cli\u003E\u003Cem\u003EDiploma in Business, with Distinction\u003C/em\u003E (equivalent to A\u003Cem\u003E grades in A-levels).\u003C/li\u003E \u003Cli\u003E\u003Cstrong\u003EKensington park school\u003C/strong\u003E, GCSEs (2022-2023).\u003C/li\u003E \u003Cli\u003E\u003Cem\u003EGCSEs in Maths (Grade 7), English (Grade 5)\u003C/em\u003E\u003C/li\u003E \u003Cli\u003E\u003Cstrong\u003ERoyal school of Wolverhampton\u003C/strong\u003E, GCSEs (2020-2022).\u003C/li\u003E \u003C/ul\u003E \u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESkills:\u003C/strong\u003E\u003C/span\u003E \u003Cul\u003E \u003Cli\u003EFinancial Analysis\u003C/li\u003E \u003Cli\u003EData Visualization\u003C/li\u003E \u003Cli\u003ENetworking\u003C/li\u003E \u003C/ul\u003E \u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ECareer\u003C/strong\u003E\u003C/span\u003E \u003Cul\u003E \u003Cli\u003EModerately successful career in \u003Cstrong\u003EModelling\u003C/strong\u003E\u003C/li\u003E \u003Cli\u003EWorked with brands including: \u003Cstrong\u003EAlexander Mcqueen, Uniqlo, Amiri, YSL\u003C/strong\u003E\u003C/li\u003E \u003C/ul\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv data-kind='tab'\u003E\u003Cmarimo-ui-element object-id='BYtC-0' random-id='7b55c8c0-2e94-5f4d-9330-75e26cf5766f'\u003E\u003Cmarimo-tabs data-initial-value='\u0026quot;\u0026quot;' data-label='null' data-tabs='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Stock Pitch\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;AFKLM credit risk\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Competition Analysis\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Future Outlook\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Company Financials\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]'\u003E\u003Cdiv data-kind='tab'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-text highlight\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\ud83d\udcc8 Stock Pitch \u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E \u003Cspan class=\"paragraph\"\u003E.I am presenting an investment opportunity involving the gradual accumulation of a 5% minority stake in Air France\u2013KLM (AF-KLM), listed on Euronext Paris.  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EAF-KLM owns irreplaceable assets, most notably key airport hubs at Paris Charles de Gaulle (CDG) and Amsterdam Schiphol (AMS). These assets represent a substantial hidden value that is not captured in the company\u2019s book value. The company\u2019s competitive position is further reinforced by its national importance and infrastructural monopoly. France holds 28% of the company, while Netherlands own 9.1%.  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EAlthough the company accumulated significant debt during the pandemic, meaningful progress has been made toward debt reduction.         A Debt/EBITDA ratio of 1.7x shows that operating cash flows are sufficient to manage current debt. An investment today will represents a purchase of future net equity at an incredibly low price. Additionally, a P/E ratio of 3.4 at the end of Q3 2025 is unusually low, especially after a year of the company fulfilling its plans for debt reduction and fleet modernization. Overall, management seems good, and the company is decreasing its debts while generating good profits  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EMy proposal is as follows:  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003ETo gradually accumulate approximately 5% of the company\u2019s equity (roughly \u20ac150\u2013180 million) over a 4\u20135 month period, in order to minimize market impact. My goal is not control, but rather to take advantage of the value recovery, while the company returns to its historically (positive) capital size  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EMy analysis shows that if there is a successful acquisition of a 5% stake in Air France\u2013KLM over the next 2\u20134 years, the price will increase exponentially to a fair level and we will have taken advantage of the momentarily undervalued worth of the company.  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EKey risks to consider:  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003ETheir debt remains as the primary problem. Currently the total debt is around \u20ac15 billion, while net debt is around \u20ac7.8 billion, which is managed well with the high revenue that the company\u2019s is successfully generating  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EThe company is also undergoing a significant fleet renewal program, involving massive capital expenditures (CAPeX), with completion planned by 2028\u20132030. This leads to a lower free cash flow (FCF) in the short term and increases the risk for revenue downturns over the next 2-3 years. However, upon completion, this modernization will provide a massive advantage and a high future FCF  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EAF-KLM is exposed to fuel price volatility and macroeconomic shocks such as recessions, global disruptions or the pandemic. That being said, the company\u2019s hedging programs mitigates these risks pretty well.  \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EOf course these risks are unavoidable, however the positive long-term prospects outweigh them, and that the company\u2019s fair value is clearly way above its current market valuation.   \u003C/span\u003E \u003Cspan class=\"paragraph\"\u003EI do not believe there is a risk of capital loss; rather, the risk lies in achieving a lower return than initially projected, with the worst-case scenario being a longer time period required for the investment to be realized. \u003C/span\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv data-kind='tab'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"afklm-credit-risk\"\u003EAFKLM Credit Risk\u003C/h2\u003E\u003C/span\u003E\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Comparing Air France-KLM against European Airlines peers using credit risk metrics.\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-kind='\u0026quot;info\u0026quot;'\u003E\u003C/marimo-callout-output\u003E\u003Cmarimo-callout-output data-html='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose d
